</head>
<body>

<div class="dev-pagebar">
  <a href="01_main.html">01 메인</a>
  <a href="02_login.html" class="current">02 로그인</a>
  <a href="03_join.html">03 회원가입</a>
  <a href="04_list.html">04 게시글 목록</a>
  <a href="05_notice.html">05 공지/Q&A</a>
  <a href="06_notice_detail.html">06 공지 상세</a>
  <a href="07_notice_update.html">07 공지 수정</a>
  <a href="08_qna_detail.html">08 Q&A 상세</a>
  <a href="09_qna_write.html">09 질문 작성</a>
  <a href="10_qna_update.html">10 질문 수정</a>
  <a href="11_write.html">11 글쓰기</a>
  <a href="12_update.html">12 게시글 수정</a>
  <a href="13_detail.html">13 게시글 상세</a>
  <a href="14_mypage.html">14 마이페이지</a>
  <a href="15_admin.html">15 관리자</a>
  <a href="16_error.html?code=404">16 오류(404)</a>
  <a href="16_error.html?code=500">16 오류(500)</a>
  <label style="margin-left:auto;color:#888">데모 등급:
    <select id="demoRoleSwitcher">
      <option value="guest">Lv.0 구경꾼(비회원)</option>
      <option value="user">Lv.1 시청자(일반회원)</option>
      <option value="critic">Lv.2 평론가(고급회원)</option>
      <option value="admin">Lv.99 관리자</option>
    </select>
  </label>
</div>

<main class="auth-wrap">
  <div class="card auth-card">
    <div class="auth-logo"><a href="01_main.html"><img src="assets/img/logo.png" alt="YouFlex" /></a></div>

    <form onsubmit="event.preventDefault(); localStorage.setItem('demoRole','user'); location.href='01_main.html';">
      <div class="form-row">
        <label>아이디</label>
        <input type="text" id="member_loginid" name="member_loginid" placeholder="아이디를 입력하세요" required />
      </div>
      <div class="form-row">
        <label>비밀번호</label>
        <input type="password" id="member_pwd" name="member_pwd" placeholder="비밀번호를 입력하세요" required />
      </div>
      <label class="remember-row">
        <input type="checkbox" /> 아이디 저장
      </label>
      <button type="submit" class="btn btn-primary btn-block">로그인</button>
    </form>

    <div class="auth-divider">또는</div>
    <button type="button" class="btn btn-block social-btn kakao" onclick="socialLogin('카카오')">
      <span class="social-icon">💬</span> 카카오로 로그인
    </button>
    <button type="button" class="btn btn-block social-btn google" onclick="socialLogin('구글')">
      <span class="social-icon">G</span> 구글로 로그인
    </button>

    <div class="auth-footer">
      아직 회원이 아니신가요? <a href="03_join.html">회원가입</a>
    </div>
  </div>
</main>

<script src="assets/app.js"></script>
<script src="assets/js/02_login.js"></script>
</body>
</html>
