<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>YouFlex - 글쓰기</title>
<link rel="stylesheet" href="/assets/css/common.css" />
<link rel="stylesheet" href="/assets/css/11_write.css" />
</head>
<body>


<header class="site-header">
  <div class="container">
    <a href="01_main.html" class="logo"><img src="assets/img/logo.png" alt="YouFlex" /></a>
    <div class="search-bar"><span class="icon">🔍</span><input type="text" placeholder="콘텐츠, 게시글 통합 검색" /></div>
    <div class="header-actions">
      <a href="14_mypage.html" class="btn btn-ghost">마이페이지</a>
      <a href="#" class="btn btn-ghost">로그아웃</a>
    </div>
  </div>
</header>

<main class="container">
  <div class="write-page-grid">
  <div class="write-wrap">
    <!-- '장르'버튼 넣을 div박스 추가(웅조) -->
    <div class="review-genre-box">
      <h1>리뷰 작성</h1>
      <button type="button" class="taste-btn box" id="tasteBtn">♡ 취향 선택</button>
    </div>

    <form id="reviewForm">
    <div class="row-2">
      <div class="form-row">
        <label>카테고리 (장르)</label>
        <select id="genre_category_id" name="genre_category_id">
          <option value="1">영화</option>
          <option value="2">드라마</option>
          <option value="3">예능</option>
          <option value="4">애니메이션</option>
          <option value="5">다큐멘터리</option>
        </select>
      </div>
      <div class="form-row">
        <label>플랫폼</label>
        <select id="review_platform" name="review_platform">
          <option>넷플릭스</option>
          <option>티빙</option>
          <option>디즈니+</option>
          <option>웨이브</option>
          <option>쿠팡플레이</option>
          <option>기타</option>
        </select>
      </div>
    </div>

    <div class="form-row">
      <label>제목</label>
      <input type="text" id="review_title" name="review_title" placeholder="제목을 입력하세요" />
    </div>

    <!-- 별점 수정(웅조) -->
     <div class="form-group">
				<label>별점 ★</label>
				<!-- <div class="rating-input">
					<span class="active">★</span>
					<span class="active">★</span>
					<span class="active">★</span>
					<span class="active">★</span>
					<span>★</span>
				</div> -->
        <div class="rating-input">
  <div class="star-box" data-value="1">
    <span class="half left">★</span>
    <span class="half right">★</span>
  </div>
  <div class="star-box" data-value="2">
    <span class="half left">★</span>
    <span class="half right">★</span>
  </div>
  <div class="star-box" data-value="3">
    <span class="half left">★</span>
    <span class="half right">★</span>
  </div>
  <div class="star-box" data-value="4">
    <span class="half left">★</span>
    <span class="half right">★</span>
  </div>
  <div class="star-box" data-value="5">
    <span class="half left">★</span>
    <span class="half right">★</span>
  </div>
</div>
				<!-- 별점값 js에서 클릭시 value를 업데이트 -->
				<input type="hidden" name="postRating" value="4">
				<div class="text-muted text-sm mt-8">별을 클릭해서 별점을 선택하세요 (1~5점)</div>
			</div>

    <!-- 대표이미지 수정(웅조) -->
    <div class="form-row">
      <label>대표 이미지</label>
      <div class="wrap-representative-img">
      <!-- <div class="upload-box"> -->
        <!-- <input> 추가완료 -->
        <input type="file" name="imgFile" id="imgInput" accept="image/*" style="font-size:0.85rem;" class="representative-img">
        <!-- </div> -->
        <img id="imgPreview" alt="미리보기"
          style="display:none; max-width:100%; max-height:200px; object-fit:cover; border-radius:8px; margin-top:10px;">
      </div>
    </div>

    <div class="form-row">
      <label>본문</label>
      <textarea id="review_content" name="review_content" placeholder="리뷰 내용을 입력하세요"></textarea>
      <div class="hint-line">※ 등록된 내용은 비속어 필터링이 자동 적용됩니다.</div>
    </div>

    <div class="form-row">
      <label>관련작품</label>
      <input type="text" id="review_related" name="review_related" placeholder="관련 작품명을 입력하세요 (예: 오징어게임 3)" />
    </div>

    <div class="write-toolbar">
      <span class="autosave-hint" id="autosaveHint">임시저장된 내용 없음</span>
      <div class="flex gap-8" style="align-items:center">
        <span class="text-muted" style="font-size:12px">제목과 내용만 저장 가능합니다</span>
        <button type="button" class="btn" id="draftBtn">임시저장</button>
        <button type="button" class="btn btn-primary" id="submitBtn">등록</button>
      </div>
    </div>
    </form>
  </div>

  <aside class="draft-sidebar">
    <h3>임시저장 목록</h3>
    <div id="draftList"></div>
    <p class="text-muted" id="draftEmptyMsg" style="font-size:12px">임시저장된 글이 없습니다.</p>
  </aside>
  </div>
</main>

     <!-- 취향(관심 장르) 선택 -->
<div class="genre-modal-backdrop" id="genreModalBackdrop">
  <div class="genre-modal-card">
    <h2 class="genre-title">취향 선택</h2>
    <p class="genre-sub">관심 있는 장르를 선택해주세요 (복수 선택 가능)</p>
    <div class="genre-grid" id="genreGrid">
      <button type="button" class="genre-chip selected" data-genre="액션"><span>액션</span>
        <span class="chip-check">✓</span></button>
      <button type="button" class="genre-chip" data-genre="모험"><span>모험</span>
        <span class="chip-check">✓</span></button>
      <button type="button" class="genre-chip" data-genre="애니메이션"><span>애니메이션</span>
        <span class="chip-check">✓</span></button>
      <button type="button" class="genre-chip" data-genre="코미디"><span>코미디</span>
        <span class="chip-check">✓</span></button>
      <button type="button" class="genre-chip" data-genre="범죄"><span>범죄</span>
        <span class="chip-check">✓</span></button>
      <button type="button" class="genre-chip" data-genre="다큐멘터리"><span>다큐멘터리</span>
        <span class="chip-check">✓</span></button>
      <button type="button" class="genre-chip selected" data-genre="드라마"><span>드라마</span>
        <span class="chip-check">✓</span></button>
      <button type="button" class="genre-chip" data-genre="가족"><span>가족</span>
        <span class="chip-check">✓</span></button>
      <button type="button" class="genre-chip" data-genre="판타지"><span>판타지</span>
        <span class="chip-check">✓</span></button>
      <button type="button" class="genre-chip" data-genre="역사"><span>역사</span>
        <span class="chip-check">✓</span></button>
      <button type="button" class="genre-chip" data-genre="공포"><span>공포</span>
        <span class="chip-check">✓</span></button>
      <button type="button" class="genre-chip" data-genre="뮤지컬"><span>뮤지컬</span>
        <span class="chip-check">✓</span></button>
      <button type="button" class="genre-chip" data-genre="미스터리"><span>미스터리</span>
        <span class="chip-check">✓</span></button>
      <button type="button" class="genre-chip" data-genre="로맨스"><span>로맨스</span>
        <span class="chip-check">✓</span></button>
      <button type="button" class="genre-chip selected" data-genre="SF"><span>SF</span>
        <span class="chip-check">✓</span></button>
      <button type="button" class="genre-chip" data-genre="스릴러"><span>스릴러</span>
        <span class="chip-check">✓</span></button>
      <button type="button" class="genre-chip" data-genre="서부극"><span>서부극</span>
        <span class="chip-check">✓</span></button>
      <button type="button" class="genre-chip" data-genre="예능"><span>예능</span>
        <span class="chip-check">✓</span></button>
    </div>
    <div class="genre-modal-actions">
      <button type="button" class="btn" id="genreCancelBtn">취소</button>
      <button type="button" class="btn btn-primary" id="genreSaveBtn">저장</button>
    </div>
  </div>
</div>

<footer class="site-footer"><div class="container">YouFlex 화면 초안 (Wireframe Draft)</div></footer>

<script src="assets/js/app.js"></script>
<script src="assets/js/11_write.js"></script>
</body>
</html>
