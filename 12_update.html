<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>YouFlex - 게시글 수정</title>
<link rel="stylesheet" href="assets/common.css" />
<link rel="stylesheet" href="assets/css/12_update.css" />
</head>
<body>



<header class="site-header">
  <div class="container">
    <a href="01_main.html" class="logo"><img src="assets/img/logo.png" alt="YouFlex" /></a>
    <div class="search-bar"><span class="icon">🔍</span><input type="text" placeholder="콘텐츠, 게시글 통합 검색" /></div>
    <div class="header-actions">
      <a href="14_mypage.html" class="btn btn-ghost">마이페이지</a>
      <a href="#" class="btn btn-ghost">로그아웃</a>
    </div>
  </div>
</header>

<main class="container">
  <div class="edit-wrap">
    <div class="edit-header">
      <h1>게시글 수정</h1>
      <span class="target-chip">게시글 #101 · 2026-06-30 14:22 작성</span>
    </div>

    <div class="edit-meta-box">
      <span>조회수 <strong>15,204</strong></span>
      <span>좋아요 <strong>892</strong></span>
      <span>댓글 <strong>128</strong></span>
    </div>

    <div class="edit-notice">⚠ 수정 완료 시 게시글에 "수정됨" 표시가 노출됩니다. 별점·좋아요·댓글은 그대로 유지됩니다.</div>

    <form id="reviewUpdateForm">
    <div class="row-2">
      <div class="form-row">
        <label>카테고리 (장르)</label>
        <select id="genre_category_id" name="genre_category_id">
          <option value="1">영화</option>
          <option value="2" selected>드라마</option>
          <option value="3">예능</option>
          <option value="4">애니메이션</option>
          <option value="5">다큐멘터리</option>
        </select>
      </div>
      <div class="form-row">
        <label>플랫폼</label>
        <select id="review_platform" name="review_platform">
          <option selected>넷플릭스</option>
          <option>티빙</option>
          <option>디즈니+</option>
          <option>웨이브</option>
          <option>쿠팡플레이</option>
          <option>기타</option>
        </select>
      </div>
    </div>

    <div class="form-row">
      <label>제목</label>
      <input type="text" id="review_title" name="review_title" value="「오징어게임 3」, 이대로 끝내도 되는가 - 결말 완전분석" />
    </div>

    <div class="form-row">
      <label>대표 이미지</label>
      <div class="upload-box">
        <div class="current-thumb"></div>
        <span>현재 등록된 이미지입니다. 클릭하거나 파일을 드래그하여 교체할 수 있습니다. (선택)</span>
      </div>
    </div>

    <div class="form-row">
      <label>본문</label>
      <textarea id="review_content" name="review_content">시즌3 최종화 이후 갈린 팬들의 평가를 정리하고, 결말이 남긴 메시지를 심층 분석합니다. 전체적인 서사 구조와 캐릭터 아크를 짚어보면서, 왜 이런 결말을 선택했는지에 대한 제작진의 의도를 추측해봅니다.</textarea>
      <div class="hint-line">※ 수정된 내용은 비속어 필터링이 자동 재적용됩니다.</div>
    </div>

    <div class="form-row">
      <label>관련작품</label>
      <input type="text" id="review_related" name="review_related" value="오징어게임 시즌1, 오징어게임 시즌2" />
    </div>

    <div class="edit-toolbar">
      <a href="13_detail.html" class="btn">취소</a>
      <button type="button" class="btn btn-primary" id="submitBtn">수정 완료</button>
    </div>
    </form>
  </div>
</main>

<footer class="site-footer"><div class="container">YouFlex 화면 초안 (Wireframe Draft)</div></footer>

<script src="assets/app.js"></script>
<script src="assets/js/12_update.js"></script>
</body>
</html>
